<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maintenance | TransitOps</title>

<link rel="stylesheet" href="assets/css/dashboard.css">
<link rel="stylesheet" href="assets/css/maintenance.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<!-- Sidebar -->

<aside class="sidebar">

<h2 class="logo">🚚 TransitOps</h2>

<ul>

<li onclick="location.href='dashboard.html'">Dashboard</li>

<li onclick="location.href='vehicles.html'">Fleet</li>

<li onclick="location.href='drivers.html'">Drivers</li>

<li onclick="location.href='trips.html'">Trips</li>

<li class="active">Maintenance</li>

<li onclick="location.href='fuel.html'">Fuel & Expenses</li>

<li onclick="location.href='reports.html'">Reports</li>

<li onclick="location.href='wages.html'">Wages</li>
<li onclick="location.href='settings.html'">Settings</li>
</ul>

</aside>

<!-- Main -->

<main class="main">

<div class="page-header">

<h1>Vehicle Maintenance</h1>

<button id="addBtn">
+ New Service
</button>

</div>

<!-- Search -->

<div class="toolbar">

<input
type="text"
id="search"
placeholder="Search Vehicle...">

<select id="statusFilter">

<option value="">All Status</option>

<option>Pending</option>

<option>In Progress</option>

<option>Completed</option>

</select>

</div>

<!-- Form -->

<div class="form-box" id="maintenanceForm">

<h2>Maintenance Details</h2>

<div class="grid">

<select id="vehicle">

<option>Select Vehicle</option>

</select>

<select id="serviceType">

<option>Oil Change</option>

<option>Engine Service</option>

<option>Brake Service</option>

<option>Tyre Replacement</option>

<option>Battery</option>

<option>General Service</option>

</select>

<input
type="date"
id="serviceDate">

<input
type="number"
id="cost"
placeholder="Service Cost">

<input
type="text"
id="mechanic"
placeholder="Mechanic Name">

<select id="status">

<option>Pending</option>

<option>In Progress</option>

<option>Completed</option>

</select>

<textarea
id="remarks"
placeholder="Remarks"></textarea>

</div>

<div class="buttons">

<button id="saveMaintenance">

Save

</button>

<button id="cancel">

Cancel

</button>

</div>

</div>

<!-- Table -->

<div class="table-box">

<table id="maintenanceTable">

<thead>

<tr>

<th>Vehicle</th>

<th>Service</th>

<th>Date</th>

<th>Mechanic</th>

<th>Cost</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</main>

</div>

<script src="assets/js/maintenance.js"></script>

</body>

</html>
