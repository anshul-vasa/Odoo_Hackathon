<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vehicle Registry | TransitOps</title>

<link rel="stylesheet" href="assets/css/dashboard.css">
<link rel="stylesheet" href="assets/css/vehicles.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<!-- Sidebar -->

 <aside class="sidebar">

<h2 class="logo">🚚 TransitOps</h2>

<ul>

<li onclick="location.href='dashboard.html'">Dashboard</li>

<li class="active">Fleet</li>

<li onclick="location.href='drivers.html'">Drivers</li>

<li onclick="location.href='trips.html'">Trips</li>

<li onclick="location.href='maintenance.html'">Maintenance</li>

<li onclick="location.href='fuel.html'">Fuel & Expenses</li>

<li onclick="location.href='reports.html'">Reports</li>

<li onclick="location.href='wages.html'">Wages</li>

<li onclick="location.href='settings.html'">Settings</li>

</ul>

</aside>

<!-- Main -->

<main class="main">

<div class="page-header">

<h1>Vehicle Registry</h1>

<button id="addBtn">

+ Add Vehicle

</button>

</div>

<!-- Search -->

<div class="toolbar">

<input
type="text"
id="search"
placeholder="Search Vehicle">

<select id="statusFilter">

<option value="">All Status</option>

<option>Available</option>

<option>On Trip</option>

<option>In Shop</option>

<option>Retired</option>

</select>

</div>

<!-- Form -->

<div
class="form-box"
id="vehicleForm">

<h2 id="title">

Add Vehicle

</h2>

<div class="grid">

<input
id="regNo"
type="text"
placeholder="Registration Number">

<input
id="model"
type="text"
placeholder="Vehicle Model">

<select id="type">

<option>Truck</option>

<option>Van</option>

<option>Pickup</option>

<option>Mini Truck</option>

</select>

<input
id="capacity"
type="number"
placeholder="Load Capacity">

<input
id="odometer"
type="number"
placeholder="Odometer">

<select id="status">

<option>Available</option>

<option>On Trip</option>

<option>In Shop</option>

<option>Retired</option>

</select>

</div>

<div class="buttons">

<button
type="button"
id="save">

Save Vehicle

</button>

<button
type="button"
id="cancel">

Cancel

</button>

</div>

</div>

<!-- Table -->

<div class="table-box">

<table id="vehicleTable">

<thead>

<tr>

<th>Registration</th>

<th>Model</th>

<th>Type</th>

<th>Capacity</th>

<th>Odometer</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</main>

</div>

<script src="assets/js/vehicles.js"></script>

</body>

</html>
