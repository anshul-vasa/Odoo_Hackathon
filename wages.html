<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Driver Wages | TransitOps</title>

    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/wages.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

<div class="container">

<!-- Sidebar -->

<aside class="sidebar">

<h2 class="logo">🚚 TransitOps</h2>

<ul>

<li onclick="location.href='dashboard.html'">Dashboard</li>

<li onclick="location.href='vehicles.html'">Fleet</li>

<li onclick="location.href='drivers.html'">Drivers</li>

<li onclick="location.href='trips.html'">Trips</li>

<li onclick="location.href='maintenance.html'">Maintenance</li>

<li onclick="location.href='fuel.html'">Fuel & Expenses</li>


<li onclick="location.href='reports.html'">Reports</li>

<li class="active">Wages</li>

</ul>

</aside>

<!-- Main -->

<main class="main">

<div class="page-header">

<h1>Driver Wages Management</h1>

<button id="addBtn">

+ Generate Salary

</button>

</div>

<!-- KPI Cards -->

<div class="cards">

<div class="card">

<h4>Total Payroll</h4>

<h2 id="totalPayroll">₹0</h2>

</div>

<div class="card">

<h4>Paid</h4>

<h2 id="paidCount">0</h2>

</div>

<div class="card">

<h4>Pending</h4>

<h2 id="pendingCount">0</h2>

</div>

<div class="card">

<h4>Drivers</h4>

<h2 id="driverCount">0</h2>

</div>

</div>

<!-- Search -->

<div class="toolbar">

<input
type="text"
id="search"
placeholder="Search Driver">

<select id="statusFilter">

<option value="">Payment Status</option>

<option>Paid</option>

<option>Pending</option>

</select>

</div>

<!-- Salary Form -->

<div class="form-box" id="salaryForm">

<h2>Salary Details</h2>

<div class="grid">

<select id="driver">

<option>Select Driver</option>

</select>

<input
type="date"
id="salaryDate">

<input
type="number"
id="basic"
placeholder="Basic Salary">

<input
type="number"
id="tripAllowance"
placeholder="Trip Allowance">

<input
type="number"
id="fuelAllowance"
placeholder="Fuel Allowance">

<input
type="number"
id="foodAllowance"
placeholder="Food Allowance">

<input
type="number"
id="bonus"
placeholder="Bonus">

<input
type="number"
id="deduction"
placeholder="Deduction">

<input
type="number"
id="netSalary"
placeholder="Net Salary"
readonly>

<select id="paymentStatus">

<option>Pending</option>

<option>Paid</option>

</select>

</div>

<div class="buttons">

<button id="saveSalary">

Save Salary

</button>

<button id="cancel">

Cancel

</button>

</div>

</div>

<!-- Salary Table -->

<div class="table-box">

<table id="salaryTable">

<thead>

<tr>

<th>Driver</th>

<th>Date</th>

<th>Basic</th>

<th>Bonus</th>

<th>Deduction</th>

<th>Net Salary</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</main>

</div>

<script src="assets/js/wages.js"></script>

</body>

</html>
