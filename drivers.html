<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Management | TransitOps</title>

<link rel="stylesheet" href="assets/css/dashboard.css">
<link rel="stylesheet" href="assets/css/drivers.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<!-- Sidebar -->

<aside class="sidebar">

<h2 class="logo">🚚 TransitOps</h2>

<ul>

<li onclick="location.href='dashboard.html'">Dashboard</li>

<li onclick="location.href='vehicles.html'">Fleet</li>

<li class="active">Drivers</li>

<li onclick="location.href='trips.html'">Trips</li>

<li onclick="location.href='maintenance.html'">Maintenance</li>

<li onclick="location.href='fuel.html'">Fuel & Expenses</li>

<li onclick="location.href='reports.html'">Reports</li>

<li onclick="location.href='wages.html'">Wages</li>
<li onclick="location.href='settings.html'">Settings</li>
</ul>

</aside>

<!-- Main -->

<main class="main">

<div class="page-header">

<h1>Driver Management</h1>

<button type="button" id="addDriver">

+ Add Driver

</button>

</div>

<!-- Search -->

<div class="toolbar">

<input
type="text"
id="searchDriver"
placeholder="Search Driver...">

<select id="filterStatus">

<option value="">All Status</option>

<option value="Available">Available</option>

<option value="On Trip">On Trip</option>

<option value="Off Duty">Off Duty</option>

<option value="Suspended">Suspended</option>

</select>

</div>

<!-- Form -->

<div class="form-box" id="driverBox">

<h2 id="formTitle">

Add Driver

</h2>

<div class="grid">

<input
type="text"
id="driverName"
placeholder="Driver Name">

<input
type="text"
id="licenseNo"
placeholder="License Number">

<input
type="text"
id="licenseCategory"
placeholder="License Category">

<input
type="date"
id="expiryDate">

<input
type="tel"
id="mobile"
placeholder="Mobile Number">

<input
type="number"
id="safetyScore"
placeholder="Safety Score (0-100)">

<select id="driverStatus">

<option>Available</option>

<option>On Trip</option>

<option>Off Duty</option>

<option>Suspended</option>

</select>

</div>

<div class="buttons">

<button type="button" id="saveDriver">

Save Driver

</button>

<button type="button" id="cancelDriver">

Cancel

</button>

</div>

</div>

<!-- Table -->

<div class="table-box">

<table id="driverTable">

<thead>

<tr>

<th>Name</th>

<th>License</th>

<th>Category</th>

<th>Expiry</th>

<th>Mobile</th>

<th>Safety</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</main>

</div>

<script src="assets/js/drivers.js"></script>

</body>

</html>
