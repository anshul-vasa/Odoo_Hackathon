<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trip Dispatcher | TransitOps</title>

    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/trips.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

<div class="container">

<!-- Sidebar -->

<aside class="sidebar">

<h2 class="logo">🚚 TransitOps</h2>

<ul>

<li onclick="location.href='dashboard.html'">Dashboard</li>

<li onclick="location.href='vehicles.html'">Fleet</li>

<li onclick="location.href='drivers.html'">Drivers</li>

<li class="active">Trips</li>

<li onclick="location.href='maintenance.html'">Maintenance</li>

<li onclick="location.href='fuel.html'">Fuel & Expenses</li>

<li onclick="location.href='reports.html'">Reports</li>

<li onclick="location.href='wages.html'">Wages</li>

</ul>

</aside>

<!-- Main -->

<main class="main">

<div class="navbar">

<input
type="text"
placeholder="Search Trip...">

<div class="profile">

<span>Raven K.</span>

<span class="role">
Dispatcher
</span>

</div>

</div>

<div class="trip-wrapper">

<!-- LEFT -->

<div class="trip-form">

<h2>Trip Dispatcher</h2>

<div class="stepper">

<div class="step active">
<div class="circle"></div>
<p>Draft</p>
</div>

<div class="line"></div>

<div class="step">
<div class="circle blue"></div>
<p>Dispatched</p>
</div>

<div class="line"></div>

<div class="step">
<div class="circle"></div>
<p>Completed</p>
</div>

<div class="line"></div>

<div class="step">
<div class="circle"></div>
<p>Cancelled</p>
</div>

</div>

<label>Source</label>

<input
type="text"
id="source"
placeholder="Enter Source">

<label>Destination</label>

<input
type="text"
id="destination"
placeholder="Enter Destination">

<label>Select Vehicle</label>

<select id="vehicle">

<option>Select Vehicle</option>

</select>

<label>Select Driver</label>

<select id="driver">

<option>Select Driver</option>

</select>

<label>Cargo Weight (KG)</label>

<input
type="number"
id="cargo">

<label>Planned Distance (KM)</label>

<input
type="number"
id="distance">

<div id="validationBox">

Vehicle Capacity :
<b id="capacity">
0 KG
</b>

<br>

Cargo Weight :
<b id="weight">
0 KG
</b>

</div>

<div class="buttons">

<button id="dispatchBtn">

Dispatch Trip

</button>

<button id="cancelBtn">

Cancel

</button>

</div>

</div>

<!-- RIGHT -->

<div class="live-board">

<h2>Live Trip Board</h2>

<div id="tripBoard">

<!-- JS -->

</div>

</div>

</div>

</main>

</div>

<script src="assets/js/trips.js"></script>

</body>

</html>
